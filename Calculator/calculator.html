<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/exercises/calculator.css" />
    <title>Calculator</title>
  </head>
  <body>
    <img class="image" src="/images/emoji.png" />
    <div class="calculator">
      <div class="calculator-head">
        <input type="text" class="display showCalculation" />
      </div>
      <div class="calculator-body">
        <div class="button-row-div">
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('1')"
          >
            1
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('4')"
          >
            4
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('7')"
          >
            7
          </button>
          <button
            class="calculator-button-eval"
            onclick="
              calculation = eval(calculation);
              displayCalculation();
            "
          >
            =
          </button>
          <button
            class="reset"
            onclick="
              calculation = '';
              displayCalculation();
            "
          >
            C
          </button>
        </div>
        <div class="button-row-div">
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('2')"
          >
            2
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('5')"
          >
            5
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('8')"
          >
            8
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('0')"
          >
            0
          </button>
        </div>
        <div class="button-row-div">
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('3')"
          >
            3
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('6')"
          >
            6
          </button>
          <button
            class="calculator-buttons"
            onclick="calculateCalculation('9')"
          >
            9
          </button>
          <button class="calculator-button" onclick="calculateCalculation('.')">
            .
          </button>
        </div>
        <div class="button-row-div">
          <button class="calculator-button" onclick="calculateCalculation('+')">
            +
          </button>
          <button class="calculator-button" onclick="calculateCalculation('-')">
            -
          </button>
          <button class="calculator-button" onclick="calculateCalculation('*')">
            *
          </button>
          <button class="calculator-button" onclick="calculateCalculation('/')">
            /
          </button>
        </div>
      </div>
    </div>
    <script src="/exercises/calculator.js"></script>
  </body>
</html>
